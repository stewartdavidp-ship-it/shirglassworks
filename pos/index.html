<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Shir Glassworks — Point of Sale</title>
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<style>
:root {
  --bg: #1a1a1a;
  --card: #242424;
  --border: #333;
  --text: #e8e0d4;
  --muted: #9a9089;
  --gold: #c4944a;
  --green: #4caf50;
  --yellow: #ffc107;
  --red: #f44336;
  --blue: #42a5f5;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: -webkit-fill-available;
  -webkit-user-select: none; user-select: none;
  padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
}

/* Top bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border);
}
.top-bar h1 { font-size: 16px; font-weight: 600; }
.top-bar .mode-badge { font-size: 11px; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 600; }

/* Screens */
.screen { display: none; height: calc(100vh - 50px - var(--safe-top) - var(--safe-bottom)); overflow-y: auto; }
.screen.active { display: flex; flex-direction: column; }

/* Camera screen */
#cameraScreen { position: relative; background: #000; overflow: hidden; }
#cameraScreen video { width: 100%; height: 100%; object-fit: cover; }
.capture-btn {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff;
  background: rgba(255,255,255,0.3); cursor: pointer; z-index: 10;
  -webkit-tap-highlight-color: transparent;
}
.capture-btn:active { background: rgba(255,255,255,0.6); }
.capture-btn.processing { opacity: 0.5; pointer-events: none; }
.camera-denied {
  display: none; position: absolute; inset: 0; background: var(--bg);
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  padding: 24px; text-align: center;
}
.camera-denied p { color: var(--muted); }
.manual-btn {
  position: absolute; bottom: 36px; right: 24px; z-index: 10;
  background: var(--card); color: var(--text); border: 1px solid var(--border);
  padding: 10px 16px; border-radius: 8px; font-size: 14px; cursor: pointer;
}

/* Result screen */
#resultScreen { padding: 0; }
.result-header { display: flex; gap: 12px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
.result-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }
.result-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.result-name { font-size: 18px; font-weight: 600; }
.result-confidence { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; margin-top: 4px; }
.conf-high { color: var(--green); }
.conf-med { color: var(--yellow); }
.conf-low { color: var(--red); }

/* Items list */
.items-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.sale-item {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  background: var(--card); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border);
}
.sale-item img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
.sale-item-info { flex: 1; }
.sale-item-name { font-weight: 600; font-size: 15px; }
.sale-item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.sale-item-qty { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-val { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }
.remove-btn { color: var(--red); font-size: 20px; cursor: pointer; padding: 4px 8px; }

/* Add more items button */
.add-more-btn {
  display: block; width: 100%; padding: 12px; margin-top: 4px;
  background: transparent; border: 2px dashed var(--border); border-radius: 8px;
  color: var(--muted); font-size: 14px; cursor: pointer; text-align: center;
}
.add-more-btn:active { background: var(--card); }

/* Payment section */
.payment-section { padding: 16px; border-top: 1px solid var(--border); background: var(--card); }
.payment-row { display: flex; gap: 8px; margin-bottom: 12px; }
.payment-type-btn {
  flex: 1; padding: 14px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--card); color: var(--text); font-size: 16px; font-weight: 600;
  cursor: pointer; text-align: center;
}
.payment-type-btn.selected { border-color: var(--gold); background: rgba(196,148,74,0.15); }
.amount-input {
  width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 24px; font-weight: 600;
  text-align: center; margin-bottom: 12px;
}
.amount-input::placeholder { color: var(--muted); }
.save-sale-btn {
  width: 100%; padding: 16px; border-radius: 8px; border: none;
  background: var(--green); color: #fff; font-size: 18px; font-weight: 700;
  cursor: pointer;
}
.save-sale-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.save-sale-btn:active:not(:disabled) { opacity: 0.8; }

/* Product picker */
#pickerScreen { padding: 0; }
.picker-search { padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
.picker-search input {
  width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 15px;
}
.picker-grid { flex: 1; overflow-y: auto; padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; align-content: start; }
.picker-card {
  background: var(--card); border-radius: 8px; border: 1px solid var(--border);
  overflow: hidden; cursor: pointer;
}
.picker-card:active { border-color: var(--gold); }
.picker-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
.picker-card-info { padding: 8px; }
.picker-card-name { font-size: 13px; font-weight: 600; }
.picker-card-price { font-size: 12px; color: var(--gold); margin-top: 2px; }

/* Success screen */
#successScreen { align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 16px; }
#successScreen .checkmark { font-size: 72px; }
#successScreen h2 { font-size: 24px; }
#successScreen p { color: var(--muted); font-size: 16px; }
.new-sale-btn {
  margin-top: 16px; padding: 16px 40px; border-radius: 8px; border: none;
  background: var(--gold); color: #000; font-size: 18px; font-weight: 700; cursor: pointer;
}

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--card); color: var(--text); padding: 10px 20px; border-radius: 8px;
  font-size: 14px; z-index: 100; border: 1px solid var(--border);
  opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
.toast.error { border-color: var(--red); }

/* Loading overlay */
.loading-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  z-index: 50;
}
.loading-overlay.show { display: flex; }
.loading-overlay .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { color: var(--text); font-size: 14px; }

/* Auth screen */
#authScreen { align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 16px; }
#authScreen h2 { font-size: 20px; }
#authScreen p { color: var(--muted); }
.sign-in-btn {
  padding: 14px 32px; border-radius: 8px; border: none;
  background: var(--gold); color: #000; font-size: 16px; font-weight: 600; cursor: pointer;
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <h1>Shir Glassworks</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="mode-badge" id="modeBadge">POS</span>
    <button id="eventSettingsBtn" onclick="showEventSettings()" style="display:none;background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:16px;cursor:pointer;color:var(--text);">⚙</button>
  </div>
</div>

<!-- Event Banner (shown when linked to an event) -->
<div id="eventBanner" style="display:none;background:var(--green);color:white;padding:8px 16px;font-size:13px;align-items:center;justify-content:space-between;">
  <span>🎪 <strong id="eventBannerName">Event</strong> — <span id="eventBannerStats">0 packed, 0 sold</span></span>
</div>

<!-- Auth Screen -->
<div id="authScreen" class="screen">
  <h2>Sign In Required</h2>
  <p>You need to sign in to use the Point of Sale.</p>
  <button class="sign-in-btn" onclick="signIn()">Sign In with Google</button>
</div>

<!-- Camera Screen -->
<div id="cameraScreen" class="screen">
  <video id="cameraVideo" autoplay playsinline muted></video>
  <button class="capture-btn" id="captureBtn" onclick="capturePhoto()"></button>
  <button class="manual-btn" onclick="openPicker()">Pick Manually</button>
  <div class="camera-denied" id="cameraDenied">
    <p>Camera access is needed to identify products.<br>Please allow camera access in your browser settings.</p>
    <button class="manual-btn" style="position:static" onclick="openPicker()">Pick Manually Instead</button>
  </div>
</div>

<!-- Result / Cart Screen -->
<div id="resultScreen" class="screen">
  <div class="result-header" id="resultHeader"></div>
  <div class="items-list" id="itemsList"></div>
  <button class="add-more-btn" onclick="addMoreItems()">+ Add Another Item</button>
  <div class="payment-section">
    <div class="payment-row">
      <button class="payment-type-btn selected" id="cashBtn" onclick="selectPayment('cash')">Cash</button>
      <button class="payment-type-btn" id="squareBtn" onclick="selectPayment('square')">Square</button>
    </div>
    <input type="text" class="amount-input" id="amountInput" placeholder="$0.00" inputmode="decimal" onfocus="this.select()">
    <div style="display:flex;gap:8px;margin-bottom:12px;" id="notesRow">
      <input type="text" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;" id="saleNotes" placeholder="Notes (optional)">
    </div>
    <button class="save-sale-btn" id="saveSaleBtn" onclick="saveSale()">Complete Sale</button>
  </div>
</div>

<!-- Product Picker Screen -->
<div id="pickerScreen" class="screen">
  <div class="picker-search">
    <input type="text" id="pickerSearchInput" placeholder="Search products..." oninput="filterPicker(this.value)">
  </div>
  <div class="picker-grid" id="pickerGrid"></div>
  <div style="padding:12px 16px;background:var(--card);border-top:1px solid var(--border);">
    <button style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;cursor:pointer;" onclick="closePicker()">Cancel</button>
  </div>
</div>

<!-- Success Screen -->
<div id="successScreen" class="screen">
  <div class="checkmark">&#10003;</div>
  <h2>Sale Recorded!</h2>
  <p id="successSummary"></p>
  <div id="receiptSection" style="margin-top:16px;">
    <button onclick="showReceiptForm()" style="background:none;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;">📧 Send Receipt?</button>
    <div id="receiptForm" style="display:none;margin-top:16px;text-align:left;max-width:320px;margin-left:auto;margin-right:auto;">
      <div style="margin-bottom:10px;">
        <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:4px;">Email</label>
        <input type="email" id="receiptEmail" placeholder="customer@email.com" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:'DM Sans',sans-serif;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:4px;">Phone (SMS)</label>
        <input type="tel" id="receiptPhone" placeholder="+1 555-123-4567" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:'DM Sans',sans-serif;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--muted);">
          <input type="checkbox" id="receiptOptIn" checked> OK to follow up with future offers
        </label>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="sendReceiptBtn" onclick="sendReceipt()" style="flex:1;background:var(--primary);color:white;border:none;padding:10px;border-radius:6px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;">Send</button>
        <button onclick="skipReceipt()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:10px 16px;border-radius:6px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;">Skip</button>
      </div>
      <div id="receiptStatus" style="margin-top:8px;font-size:13px;"></div>
    </div>
  </div>
  <button class="new-sale-btn" onclick="newSale()">New Sale</button>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p id="loadingText">Identifying product...</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase + Camera -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="../shared/camera.js"></script>
<script>
// ============================================================
// Firebase Init
// ============================================================
var firebaseApp = firebase.initializeApp({
  apiKey: "FIREBASE_API_KEY_PLACEHOLDER",
  authDomain: "shir-glassworks.firebaseapp.com",
  databaseURL: "https://shir-glassworks-default-rtdb.firebaseio.com",
  projectId: "shir-glassworks",
  storageBucket: "shir-glassworks.firebasestorage.app"
}, 'pos-app');
var db = firebaseApp.database();
var auth = firebaseApp.auth();

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

var CLASSIFY_URL = 'https://us-central1-shir-glassworks.cloudfunctions.net/shirClassifyImage';
var UPLOAD_URL = 'https://us-central1-shir-glassworks.cloudfunctions.net/shirUploadImage';
var PRODUCTS_PATH = 'shirglassworks/public/products';
var SALES_PATH = 'shirglassworks/admin/sales';
var SALES_EVENTS_PATH = 'shirglassworks/admin/salesEvents';
var STUDIO_LOCATIONS_PATH = 'shirglassworks/config/studioLocations';
var STUDIO_RADIUS_METERS = 500;

// ============================================================
// State
// ============================================================
var products = {};
var productsList = [];
var camera = null;
var currentUser = null;
var authToken = null;
var saleItems = [];       // [{ productId, productName, quantity, confidence, price }]
var capturedImageBase64 = null;
var capturedPreviewUrl = null;
var paymentType = 'cash';

// Event context (from URL param or GPS detection)
var eventId = null;
var eventData = null;
var isRemote = false;

// Parse eventId from URL
(function() {
  var params = new URLSearchParams(window.location.search);
  eventId = params.get('eventId') || null;
})();

// Haversine distance in meters
function haversineDistance(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function detectLocation() {
  if (eventId) return; // Already linked via URL param

  // Fetch active events first (needed for all scenarios)
  db.ref(SALES_EVENTS_PATH).orderByChild('status').equalTo('active').once('value').then(function(evSnap) {
    var activeEvents = evSnap.val() || {};
    var eventKeys = Object.keys(activeEvents);

    // Show gear icon now that detection is running
    document.getElementById('eventSettingsBtn').style.display = '';

    if (!navigator.geolocation) {
      // No geolocation — show event picker if events exist, else skip
      if (eventKeys.length > 0) showEventModal(activeEvents, null);
      return;
    }

    db.ref(STUDIO_LOCATIONS_PATH).once('value').then(function(snap) {
      var locations = snap.val();
      if (!locations || Object.keys(locations).length === 0) {
        // No studios configured — show modal if events exist
        if (eventKeys.length > 0) showEventModal(activeEvents, null);
        return;
      }

      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        var nearStudio = false;

        Object.keys(locations).forEach(function(k) {
          var loc = locations[k];
          var dist = haversineDistance(lat, lng, loc.lat, loc.lng);
          if (dist <= (loc.radius || STUDIO_RADIUS_METERS)) nearStudio = true;
        });

        if (!nearStudio) {
          isRemote = true;
          if (eventKeys.length === 1) {
            // Single active event — suggest it
            showEventModal(activeEvents, eventKeys[0]);
          } else if (eventKeys.length > 1) {
            // Multiple — let user pick
            showEventModal(activeEvents, null);
          } else {
            // Away from studio, no events
            showEventModal({}, null);
          }
        }
        // At studio — no modal, POS opens normally
      }, function() {
        // GPS failed — show event picker if events exist, else show away notice
        if (eventKeys.length > 0) showEventModal(activeEvents, null);
        else showEventModal({}, null);
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
    });
  });
}

function showEventModal(activeEvents, suggestedEventId) {
  var existing = document.getElementById('eventModeModal');
  if (existing) existing.remove();

  var eventKeys = Object.keys(activeEvents);
  var html = '<div id="eventModeModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;">' +
    '<div style="background:var(--card);border-radius:12px;padding:24px;max-width:380px;width:100%;text-align:center;">';

  if (eventKeys.length === 0) {
    // Scenario C: No active events
    html += '<div style="font-size:2.5rem;margin-bottom:12px;">📍</div>' +
      '<h3 style="margin:0 0 8px;font-size:16px;">You\u2019re away from the studio</h3>' +
      '<p style="color:var(--muted);font-size:14px;margin-bottom:20px;">No active events found. Sales will record without an event link.</p>' +
      '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
        '<button onclick="dismissEventModal()" style="padding:12px 24px;border-radius:8px;border:none;background:var(--green);color:white;font-size:14px;font-weight:600;cursor:pointer;">Continue</button>' +
      '</div>';
  } else if (suggestedEventId && activeEvents[suggestedEventId]) {
    // Scenario A: Single suggested event
    var ev = activeEvents[suggestedEventId];
    var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
    var evInfo = esc(ev.name || 'Active Event');
    if (evDate) evInfo += ' \u00b7 ' + esc(evDate);
    if (ev.location) evInfo += ' \u00b7 ' + esc(ev.location);

    html += '<div style="font-size:2.5rem;margin-bottom:12px;">🎪</div>' +
      '<h3 style="margin:0 0 8px;font-size:16px;">Craft Fair Mode</h3>' +
      '<p style="color:var(--muted);font-size:14px;margin-bottom:20px;">Detected: <strong>' + evInfo + '</strong></p>' +
      '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
        '<button onclick="linkToEvent(\'' + suggestedEventId + '\')" style="padding:12px 24px;border-radius:8px;border:none;background:var(--green);color:white;font-size:14px;font-weight:600;cursor:pointer;">\u2713 Yes, that\u2019s right</button>' +
        (eventKeys.length > 1 ? '<button onclick="expandEventList()" style="padding:12px 24px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;">Pick different \u25be</button>' : '') +
        '<button onclick="dismissEventModal()" style="padding:12px 24px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;">No event</button>' +
      '</div>' +
      '<div id="eventListExpanded" style="display:none;margin-top:16px;"></div>';
  } else {
    // Scenario B: Multiple events, no suggestion
    html += '<div style="font-size:2.5rem;margin-bottom:12px;">🎪</div>' +
      '<h3 style="margin:0 0 8px;font-size:16px;">Which event are you at?</h3>' +
      '<div style="margin-top:12px;text-align:left;">';
    eventKeys.forEach(function(eid) {
      var ev = activeEvents[eid];
      var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
      html += '<button onclick="linkToEvent(\'' + eid + '\')" style="display:block;width:100%;padding:12px 16px;margin-bottom:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;text-align:left;">' +
        '<strong>' + esc(ev.name || 'Event') + '</strong>' + (evDate ? ' <span style="color:var(--muted);">\u00b7 ' + esc(evDate) + '</span>' : '') +
        '</button>';
    });
    html += '<button onclick="dismissEventModal()" style="display:block;width:100%;padding:12px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:14px;cursor:pointer;text-align:center;">No event \u2014 just record sales</button>';
    html += '</div>';
  }

  html += '</div></div>';

  // Store active events for expandEventList / event settings
  window._activeEvents = activeEvents;

  document.body.insertAdjacentHTML('beforeend', html);
}

function expandEventList() {
  var container = document.getElementById('eventListExpanded');
  if (!container) return;
  var activeEvents = window._activeEvents || {};
  var html = '';
  Object.keys(activeEvents).forEach(function(eid) {
    var ev = activeEvents[eid];
    var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
    html += '<button onclick="linkToEvent(\'' + eid + '\')" style="display:block;width:100%;padding:10px 14px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;text-align:left;">' +
      '<strong>' + esc(ev.name || 'Event') + '</strong>' + (evDate ? ' <span style="color:var(--muted);">\u00b7 ' + esc(evDate) + '</span>' : '') +
      '</button>';
  });
  container.innerHTML = html;
  container.style.display = 'block';
}

function linkToEvent(evId) {
  eventId = evId;
  loadEventContext();
  dismissEventModal();
  document.getElementById('eventSettingsBtn').style.display = '';
  showToast('Linked to event!');
}

function dismissEventModal() {
  var el = document.getElementById('eventModeModal');
  if (el) el.remove();
}

function showEventSettings() {
  var existing = document.getElementById('eventSettingsModal');
  if (existing) existing.remove();

  // Fetch fresh active events
  db.ref(SALES_EVENTS_PATH).orderByChild('status').equalTo('active').once('value').then(function(evSnap) {
    var activeEvents = evSnap.val() || {};
    var eventKeys = Object.keys(activeEvents);

    var html = '<div id="eventSettingsModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;">' +
      '<div style="background:var(--card);border-radius:12px 12px 0 0;padding:24px;max-width:400px;width:100%;max-height:70vh;overflow-y:auto;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
          '<h3 style="margin:0;font-size:16px;">Event Settings</h3>' +
          '<button onclick="closeEventSettings()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">\u2715</button>' +
        '</div>' +
        '<p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Current: <strong>' + esc(eventData ? (eventData.name || 'Event') : 'No event linked') + '</strong></p>';

    if (eventKeys.length > 0) {
      html += '<div style="margin-bottom:12px;">';
      eventKeys.forEach(function(eid) {
        var ev = activeEvents[eid];
        var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
        var isCurrent = eid === eventId;
        html += '<button onclick="switchEvent(\'' + eid + '\')" style="display:block;width:100%;padding:12px 16px;margin-bottom:8px;border-radius:8px;border:1px solid ' + (isCurrent ? 'var(--green)' : 'var(--border)') + ';background:' + (isCurrent ? 'rgba(76,175,80,0.1)' : 'transparent') + ';color:var(--text);font-size:14px;cursor:pointer;text-align:left;">' +
          (isCurrent ? '\u2713 ' : '') + '<strong>' + esc(ev.name || 'Event') + '</strong>' + (evDate ? ' <span style="color:var(--muted);">\u00b7 ' + esc(evDate) + '</span>' : '') +
          '</button>';
      });
      html += '</div>';
    } else {
      html += '<p style="color:var(--muted);font-size:14px;">No active events found.</p>';
    }

    if (eventId) {
      html += '<button onclick="unlinkEvent()" style="display:block;width:100%;padding:12px 16px;border-radius:8px;border:none;background:transparent;color:#C62828;font-size:14px;cursor:pointer;text-align:center;">Unlink event</button>';
    }

    html += '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
  });
}

function switchEvent(evId) {
  if (evId === eventId) {
    closeEventSettings();
    return;
  }
  // Detach old listener
  if (eventId) db.ref(SALES_EVENTS_PATH + '/' + eventId).off();
  eventId = evId;
  loadEventContext();
  closeEventSettings();
  showToast('Switched to event!');
}

function unlinkEvent() {
  if (eventId) db.ref(SALES_EVENTS_PATH + '/' + eventId).off();
  eventId = null;
  eventData = null;
  document.getElementById('modeBadge').textContent = 'POS';
  document.getElementById('modeBadge').style.background = '';
  document.getElementById('eventBanner').style.display = 'none';
  closeEventSettings();
  showToast('Event unlinked');
}

function closeEventSettings() {
  var el = document.getElementById('eventSettingsModal');
  if (el) el.remove();
}

// ============================================================
// Auth
// ============================================================
auth.onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    user.getIdToken().then(function(token) {
      authToken = token;
      loadProducts();
      if (eventId) {
        loadEventContext();
        document.getElementById('eventSettingsBtn').style.display = '';
      } else {
        detectLocation(); // GPS check if no event pre-linked
      }
      showScreen('cameraScreen');
      initCamera();
    });
  } else {
    currentUser = null;
    authToken = null;
    showScreen('authScreen');
  }
});

function loadEventContext() {
  if (!eventId) return;
  db.ref(SALES_EVENTS_PATH + '/' + eventId).on('value', function(snap) {
    eventData = snap.val();
    if (eventData) {
      document.getElementById('modeBadge').textContent = 'FAIR';
      document.getElementById('modeBadge').style.background = 'var(--green)';
      var banner = document.getElementById('eventBanner');
      banner.style.display = 'flex';
      document.getElementById('eventBannerName').textContent = eventData.name || 'Event';
      // Calculate stats
      var totalPacked = 0, totalSold = 0;
      if (eventData.allocations) {
        Object.keys(eventData.allocations).forEach(function(pid) {
          totalPacked += (eventData.allocations[pid].quantity || 0);
          totalSold += (eventData.allocations[pid].sold || 0);
        });
      }
      document.getElementById('eventBannerStats').textContent = totalPacked + ' packed, ' + totalSold + ' sold, ' + (totalPacked - totalSold) + ' remaining';
    }
  });
}

function signIn() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(err) {
    showToast('Sign in failed: ' + err.message, true);
  });
}

// ============================================================
// Products
// ============================================================
function loadProducts() {
  db.ref(PRODUCTS_PATH).once('value').then(function(snap) {
    products = snap.val() || {};
    productsList = Object.values(products)
      .filter(function(p) { return !p.availability || p.availability === 'available'; })
      .sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
    renderPicker();

// ============================================================
// Camera
// ============================================================
function initCamera() {
  var video = document.getElementById('cameraVideo');
  camera = new ShirCamera({
    videoElement: video,
    onCapture: handleCapture,
    onError: function(err) {
      if (err.type === 'permission') {
        document.getElementById('cameraDenied').style.display = 'flex';
      } else {
        showToast('Camera error: ' + err.message, true);
      }
    },
    onReady: function() {}
  });
  camera.start();
}

function capturePhoto() {
  if (!camera || !camera.isActive()) return;
  var btn = document.getElementById('captureBtn');
  btn.classList.add('processing');
  camera.capture().then(function() {
    btn.classList.remove('processing');
  }).catch(function() {
    btn.classList.remove('processing');
  });
}

function handleCapture(result) {
  capturedImageBase64 = result.base64;
  capturedPreviewUrl = result.previewUrl;
  camera.stop();

  // Show loading, call classify
  showLoading('Identifying product...');

  fetch(CLASSIFY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
    body: JSON.stringify({ image: result.base64, context: 'pos' })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    hideLoading();
    if (data.error) { showToast('Classification failed', true); showResultScreen([]); return; }

    // Multi-item response
    var items = data.items || [{ productId: data.productId, product: data.product, confidence: data.confidence, color: data.color, quantity: 1 }];

    saleItems = items.map(function(item) {
      var prod = item.productId ? products[item.productId] : null;
      return {
        productId: item.productId || null,
        productName: item.product || (prod ? prod.name : 'Unknown'),
        quantity: item.quantity || 1,
        confidence: item.confidence || 0,
        price: prod ? prod.price : '',
        priceCents: prod ? (prod.priceCents || 0) : 0,
        imageUrl: prod && prod.images && prod.images.length > 0 ? prod.images[0] : ''
      };
    }).filter(function(item) { return item.productId; });

    showResultScreen(saleItems);
  })
  .catch(function(err) {
    hideLoading();
    showToast('Error: ' + err.message, true);
    showResultScreen([]);
  });
}

// ============================================================
// Result / Cart Screen
// ============================================================
function showResultScreen(items) {
  if (items.length === 0) {
    // No match — go to picker
    showToast('Could not identify product — please pick manually');
    openPicker();
    return;
  }
  renderItems();
  autoFillAmount();
  showScreen('resultScreen');
}

function renderItems() {
  var html = '';
  saleItems.forEach(function(item, idx) {
    var confClass = item.confidence >= 90 ? 'conf-high' : item.confidence >= 70 ? 'conf-med' : 'conf-low';
    var confIcon = item.confidence >= 90 ? '&#10003;' : item.confidence >= 70 ? '?' : '!';
    html += '<div class="sale-item">' +
      (item.imageUrl ? '<img src="' + item.imageUrl + '" alt="">' : '<div style="width:50px;height:50px;background:var(--border);border-radius:6px;"></div>') +
      '<div class="sale-item-info">' +
        '<div class="sale-item-name">' + item.productName + '</div>' +
        '<div class="sale-item-meta">' +
          (item.price ? item.price + ' &bull; ' : '') +
          '<span class="' + confClass + '">' + confIcon + ' ' + item.confidence + '%</span>' +
        '</div>' +
      '</div>' +
      '<div class="sale-item-qty">' +
        '<button class="qty-btn" onclick="adjustQty(' + idx + ',-1)">-</button>' +
        '<span class="qty-val">' + item.quantity + '</span>' +
        '<button class="qty-btn" onclick="adjustQty(' + idx + ',1)">+</button>' +
      '</div>' +
      '<span class="remove-btn" onclick="removeItem(' + idx + ')">&times;</span>' +
    '</div>';
  });
  document.getElementById('itemsList').innerHTML = html;

  // Update result header with captured photo
  document.getElementById('resultHeader').innerHTML =
    (capturedPreviewUrl ? '<img class="result-thumb" src="' + capturedPreviewUrl + '">' : '') +
    '<div class="result-info">' +
      '<div class="result-name">' + saleItems.length + ' item' + (saleItems.length !== 1 ? 's' : '') + '</div>' +
      '<div style="font-size:13px;color:var(--muted)">Confirm items and complete sale</div>' +
    '</div>';
}

function adjustQty(idx, delta) {
  saleItems[idx].quantity = Math.max(1, saleItems[idx].quantity + delta);
  renderItems();
  autoFillAmount();
}

function removeItem(idx) {
  saleItems.splice(idx, 1);
  if (saleItems.length === 0) { newSale(); return; }
  renderItems();
  autoFillAmount();
}

function autoFillAmount() {
  var total = 0;
  saleItems.forEach(function(item) {
    total += (item.priceCents || 0) * item.quantity;
  });
  if (total > 0) {
    document.getElementById('amountInput').value = '$' + (total / 100).toFixed(2);
  } else {
    document.getElementById('amountInput').value = '';
  }
}

function addMoreItems() {
  openPicker();
}

// ============================================================
// Save Sale
// ============================================================
function saveSale() {
  if (saleItems.length === 0) { showToast('No items in sale', true); return; }

  var amountStr = document.getElementById('amountInput').value.replace(/[^0-9.]/g, '');
  var amountCents = Math.round(parseFloat(amountStr) * 100);
  if (isNaN(amountCents) || amountCents <= 0) { showToast('Enter a valid amount', true); return; }

  var btn = document.getElementById('saveSaleBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  var saleId = db.ref(SALES_PATH).push().key;
  var now = new Date().toISOString();

  var saleRecord = {
    saleId: saleId,
    timestamp: now,
    createdAt: now,
    paymentType: paymentType,
    amount: amountCents,
    items: saleItems.map(function(item) {
      return { productId: item.productId, productName: item.productName, quantity: item.quantity, confidence: item.confidence };
    }),
    imageId: null,
    receiptSent: false,
    customerContact: null,
    squarePaymentId: null,
    eventId: eventId || null,
    status: 'captured',
    notes: document.getElementById('saleNotes').value || null,
    recordedBy: currentUser ? currentUser.uid : null
  };

  // Save image to library if we have one, then save sale
  var savePromise;
  if (capturedImageBase64 && authToken) {
    savePromise = fetch(UPLOAD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({ image: capturedImageBase64, tags: ['pos', 'sale'], source: 'pos' })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.imageId) saleRecord.imageId = data.imageId;
    })
    .catch(function() { /* Image save failed — continue without */ });
  } else {
    savePromise = Promise.resolve();
  }

  savePromise.then(function() {
    // Save sale record
    return db.ref(SALES_PATH + '/' + saleId).set(saleRecord);
  }).then(function() {
    // Decrement inventory for each item
    var updates = {};
    saleItems.forEach(function(item) {
      if (item.productId) {
        // Read current stock and decrement
        updates[item.productId] = item.quantity;
      }
    });
    return decrementInventory(updates);
  }).then(function() {
    // Update event allocations if linked to an event
    if (eventId && eventData && eventData.allocations) {
      return updateEventAllocations(saleItems);
    }
  }).then(function() {
    // Store for receipt flow
    lastSaleId = saleId;
    lastSaleAmount = amountCents;
    lastSaleItems = saleItems.slice();

    btn.disabled = false;
    btn.textContent = 'Complete Sale';
    var totalStr = '$' + (amountCents / 100).toFixed(2);
    var itemNames = saleItems.map(function(i) { return i.productName; }).join(', ');
    document.getElementById('successSummary').textContent = totalStr + ' ' + paymentType + ' — ' + itemNames;

    // Reset receipt form for fresh state
    document.getElementById('receiptForm').style.display = 'none';
    document.getElementById('receiptEmail').value = '';
    document.getElementById('receiptPhone').value = '';
    document.getElementById('receiptOptIn').checked = true;
    document.getElementById('receiptStatus').textContent = '';

    showScreen('successScreen');

    // Check if any sold item was a sculpture — prompt for commission
    checkSculptureCommission(saleItems);

    // Auto-reconcile Square payment in background
    autoReconcileSquare(saleId, now);
  }).catch(function(err) {
    btn.disabled = false;
    btn.textContent = 'Complete Sale';
    showToast('Error saving sale: ' + err.message, true);
  });
}

function decrementInventory(productQtys) {
  var promises = [];
  Object.keys(productQtys).forEach(function(pid) {
    var qty = productQtys[pid];
    var prod = products[pid];
    var stockRef = db.ref('shirglassworks/admin/inventory/' + pid + '/stock');
    promises.push(
      stockRef.once('value').then(function(snap) {
        var current = snap.val();
        if (current !== null && typeof current === 'number') {
          var newVal = Math.max(0, current - qty);
          return stockRef.set(newVal).then(function() {
            // Auto-set sold status for sculptures when stock reaches 0
            if (prod && prod.businessLine === 'sculpture' && newVal <= 0) {
              return db.ref('shirglassworks/public/products/' + pid + '/status').set('sold');
            }
          });
        }
        // Object-based stock (e.g. _default.available)
        if (current && typeof current === 'object' && current._default) {
          var curAvail = current._default.available || 0;
          var newAvail = Math.max(0, curAvail - qty);
          return db.ref('shirglassworks/admin/inventory/' + pid + '/stock/_default/available').set(newAvail).then(function() {
            if (prod && prod.businessLine === 'sculpture' && newAvail <= 0) {
              return db.ref('shirglassworks/public/products/' + pid + '/status').set('sold');
            }
          });
        }
      })
    );
  });
  return Promise.all(promises);
}

function updateEventAllocations(items) {
  if (!eventId) return Promise.resolve();
  var promises = [];
  items.forEach(function(item) {
    if (!item.productId) return;
    var soldRef = db.ref(SALES_EVENTS_PATH + '/' + eventId + '/allocations/' + item.productId + '/sold');
    promises.push(
      soldRef.once('value').then(function(snap) {
        var current = snap.val() || 0;
        return soldRef.set(current + (item.quantity || 1));
      })
    );
  });
  return Promise.all(promises);
}

function openPicker() {
  renderPicker();

function renderPicker(filter) {

    : productsList;

  var html = '';
  filtered.forEach(function(p) {
    var img = p.images && p.images.length > 0 ? p.images[0] : '';
    html += '<div class="picker-card" onclick="pickProduct(\'' + p.pid + '\')">' +
      (img ? '<img src="' + img + '" alt="" loading="lazy">' : '<div style="width:100%;aspect-ratio:1;background:var(--border);"></div>') +
      '<div class="picker-card-info">' +
        '<div class="picker-card-name">' + (p.name || '') + '</div>' +
        '<div class="picker-card-price">' + (p.price || '') + '</div>' +
      '</div>' +
    '</div>';
  });
  document.getElementById('pickerGrid').innerHTML = html;
}

function filterPicker(val) { renderPicker(val); }

function pickProduct(pid) {
  var prod = products[pid];
  if (!prod) return;

  // Check if already in sale items
  var existing = saleItems.findIndex(function(i) { return i.productId === pid; });
  if (existing >= 0) {
    saleItems[existing].quantity++;
  } else {
    saleItems.push({
      productId: pid,
      productName: prod.name,
      quantity: 1,
      confidence: 100, // manual pick
      price: prod.price || '',
      priceCents: prod.priceCents || 0,
      imageUrl: prod.images && prod.images.length > 0 ? prod.images[0] : ''
    });
  }

  renderItems();
  autoFillAmount();
  showScreen('resultScreen');
}

// ============================================================
// Receipt Flow
// ============================================================

var lastSaleId = null;
var lastSaleAmount = 0;
var lastSaleItems = [];

function showReceiptForm() {
  document.getElementById('receiptForm').style.display = '';
  document.getElementById('receiptEmail').focus();
}

function skipReceipt() {
  document.getElementById('receiptForm').style.display = 'none';
}

async function sendReceipt() {
  var email = document.getElementById('receiptEmail').value.trim();
  var phone = document.getElementById('receiptPhone').value.trim();
  var optIn = document.getElementById('receiptOptIn').checked;

  if (!email && !phone) { showToast('Enter email or phone', true); return; }

  var btn = document.getElementById('sendReceiptBtn');
  var statusEl = document.getElementById('receiptStatus');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  statusEl.textContent = '';

  var token = authToken;
  var base = 'https://us-central1-shir-glassworks.cloudfunctions.net';
  var results = [];

  try {
    var receiptData = {
      items: lastSaleItems.map(function(i) { return { productName: i.productName, quantity: i.quantity }; }),
      amount: lastSaleAmount,
      date: new Date().toISOString().split('T')[0],
      saleId: lastSaleId
    };

    if (email) {
      var emailResp = await fetch(base + '/shirSendReceipt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(Object.assign({}, receiptData, { email: email }))
      });
      var emailResult = await emailResp.json();
      results.push(emailResult.success ? '📧 Email sent' : '❌ Email failed');
    }

    if (phone) {
      var smsResp = await fetch(base + '/shirSendSMS', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(Object.assign({}, receiptData, { phone: phone }))
      });
      var smsResult = await smsResp.json();
      results.push(smsResult.success ? '📱 SMS sent' : '❌ SMS failed');
    }

    // Update sale record with customer contact
    if (lastSaleId) {
      var contactUpdate = { receiptSent: true, customerContact: {} };
      if (email) contactUpdate.customerContact.email = email;
      if (phone) contactUpdate.customerContact.phone = phone;
      contactUpdate.customerContact.optIn = optIn;
      db.ref(SALES_PATH + '/' + lastSaleId).update(contactUpdate);
    }

    statusEl.innerHTML = '<span style="color:var(--green);">' + results.join(' · ') + '</span>';
    showToast(results.join(', '));
  } catch (err) {
    statusEl.innerHTML = '<span style="color:#f44336;">Error: ' + err.message + '</span>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send';
  }
}

// Auto-reconcile Square payment after PoS sale
async function autoReconcileSquare(saleId, saleTimestamp) {
  if (paymentType !== 'square') return;
  try {
    var token = authToken;
    var resp = await fetch('https://us-central1-shir-glassworks.cloudfunctions.net/shirReconcileSquarePayment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ saleId: saleId, saleTimestamp: saleTimestamp, toleranceMinutes: 5 })
    });
    var result = await resp.json();
    if (result.matched) {
      console.log('Square reconciled: payment ' + result.paymentId + ', delta ' + result.deltaSeconds + 's');
    }
  } catch (err) {
    console.log('Square reconciliation skipped:', err.message);
  }
}

// ============================================================
// Sculpture Commission Prompt
// ============================================================
function checkSculptureCommission(items) {
  var sculptureItems = items.filter(function(item) {
    var prod = products[item.productId];
    return prod && prod.businessLine === 'sculpture';
  });
  if (sculptureItems.length === 0) return;

  var piece = sculptureItems[0];
  var prod = products[piece.productId];
  setTimeout(function() {
    showCommissionPrompt(piece.productId, prod.name);
  }, 500);
}

function showCommissionPrompt(pid, pieceName) {
  var modal = document.createElement('div');
  modal.id = 'commissionModal';
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.innerHTML =
    '<div style="background:var(--card);border-radius:12px;padding:24px;max-width:400px;width:100%;">' +
      '<h3 style="margin:0 0 8px 0;color:var(--text);font-size:1.1rem;">Commission Opportunity</h3>' +
      '<p style="margin:0 0 16px 0;color:var(--muted);font-size:0.88rem;">This piece has sold. Would you like to offer the customer a commission for a similar work?</p>' +
      '<div style="display:flex;gap:8px;">' +
        '<button onclick="openCommissionForm(\'' + pid.replace(/'/g, "\\'") + '\', \'' + (pieceName || '').replace(/'/g, "\\'") + '\')" style="flex:1;padding:12px;border-radius:6px;border:none;background:var(--gold);color:white;font-weight:600;font-size:0.88rem;cursor:pointer;">Yes — Log Inquiry</button>' +
        '<button onclick="dismissCommissionModal()" style="flex:1;padding:12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.88rem;cursor:pointer;">Skip</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
}

function dismissCommissionModal() {
  var modal = document.getElementById('commissionModal');
  if (modal) modal.remove();
}

function openCommissionForm(pid, pieceName) {
  var modal = document.getElementById('commissionModal');
  if (!modal) return;
  var inner = modal.querySelector('div');
  inner.innerHTML =
    '<h3 style="margin:0 0 12px 0;color:var(--text);font-size:1.1rem;">Log Commission Inquiry</h3>' +
    '<p style="margin:0 0 12px 0;color:var(--muted);font-size:0.82rem;">For: ' + (pieceName || 'Unknown piece') + '</p>' +
    '<div style="margin-bottom:12px;"><label style="display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;">Customer Name</label>' +
      '<input type="text" id="commName" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.88rem;box-sizing:border-box;"></div>' +
    '<div style="margin-bottom:12px;"><label style="display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;">Email or Phone</label>' +
      '<input type="text" id="commContact" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.88rem;box-sizing:border-box;"></div>' +
    '<div style="margin-bottom:16px;"><label style="display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;">Notes (optional)</label>' +
      '<textarea id="commNotes" rows="2" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.88rem;resize:vertical;box-sizing:border-box;"></textarea></div>' +
    '<div style="display:flex;gap:8px;">' +
      '<button id="commSubmitBtn" onclick="submitCommission(\'' + pid.replace(/'/g, "\\'") + '\', \'' + (pieceName || '').replace(/'/g, "\\'") + '\')" style="flex:1;padding:12px;border-radius:6px;border:none;background:var(--gold);color:white;font-weight:600;font-size:0.88rem;cursor:pointer;">Save Inquiry</button>' +
      '<button onclick="dismissCommissionModal()" style="flex:1;padding:12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.88rem;cursor:pointer;">Cancel</button>' +
    '</div>';
}

async function submitCommission(pid, pieceName) {
  var name = document.getElementById('commName').value.trim();
  var contact = document.getElementById('commContact').value.trim();
  var notes = document.getElementById('commNotes').value.trim();

  if (!name && !contact) {
    showToast('Enter at least a name or contact', true);
    return;
  }

  var btn = document.getElementById('commSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    var commId = db.ref('shirglassworks/admin/commissions').push().key;
    var record = {
      sourcePieceId: pid,
      sourcePieceName: pieceName,
      customerName: name || null,
      customerContact: contact || null,
      notes: notes || null,
      status: 'new',
      channel: 'pos',
      createdAt: new Date().toISOString()
    };
    await db.ref('shirglassworks/admin/commissions/' + commId).set(record);

    // Trigger SendGrid notification via Cloud Function
    try {
      var token = currentUser ? await currentUser.getIdToken() : null;
      if (token) {
        fetch('https://us-central1-shir-glassworks.cloudfunctions.net/shirCommissionNotify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ commissionId: commId, pieceName: pieceName, customerName: name, customerContact: contact, notes: notes, channel: 'pos' })
        }).catch(function() { /* notification failed silently */ });
      }
    } catch (e) { /* notification send failed — non-blocking */ }

    dismissCommissionModal();
    showToast('Commission inquiry saved');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Save Inquiry';
    showToast('Error: ' + err.message, true);
  }
}

// ============================================================
// New Sale (reset)
// ============================================================
function newSale() {
  saleItems = [];
  capturedImageBase64 = null;
  capturedPreviewUrl = null;
  paymentType = 'cash';
  lastSaleId = null;
  lastSaleAmount = 0;
  lastSaleItems = [];
  document.getElementById('amountInput').value = '';
  document.getElementById('saleNotes').value = '';
  document.getElementById('cashBtn').classList.add('selected');
  document.getElementById('squareBtn').classList.remove('selected');
  showScreen('cameraScreen');
  if (camera && !camera.isActive()) camera.start();
}

// ============================================================
// Screen Management
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Loading...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function showToast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}
</script>
